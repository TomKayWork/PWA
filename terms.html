<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Use - William Russell Member Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .terms-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--wr-cream);
      padding: var(--space-xl);
    }
    .terms-page__icon {
      width: 80px;
      height: 80px;
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .terms-page__logo {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      margin-bottom: var(--space-sm);
    }
    .terms-page__logo .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--wr-green);
      border-radius: 50%;
      vertical-align: super;
      margin-left: 2px;
    }
    .terms-page h1 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      margin-bottom: var(--space-xl);
    }
    .terms-card {
      background: var(--wr-white);
      border-radius: var(--radius-lg);
      padding: var(--space-lg) var(--space-xl);
      margin-bottom: var(--space-md);
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
    }
    .terms-card input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid var(--wr-green);
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      margin-top: 2px;
    }
    .terms-card input[type="checkbox"]:checked {
      background: var(--wr-green);
    }
    .terms-card input[type="checkbox"]:checked::after {
      content: "\2713";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--wr-white);
      font-size: 12px;
      font-weight: 700;
    }
    .terms-card label {
      font-size: var(--font-size-sm);
      line-height: 1.5;
      color: var(--wr-grey-dark);
      cursor: pointer;
    }
    .terms-card a {
      color: var(--wr-black);
      text-decoration: underline;
      font-weight: 500;
    }
    .terms-accept {
      position: fixed;
      bottom: var(--space-xl);
      left: 50%;
      transform: translateX(-50%);
      background: none;
      border: none;
      color: var(--wr-grey);
      font-size: var(--font-size-base);
      font-weight: 500;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s, color 0.2s;
    }
    .terms-accept:not(:disabled) {
      color: var(--wr-green);
      opacity: 1;
    }
    .terms-accept:not(:disabled):hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="terms-page">
    <div class="terms-page__icon">&#x1F4AC;</div>
    <div class="terms-page__logo">William Russell<span class="dot"></span></div>
    <h1>Terms of use and privacy policy</h1>

    <div class="terms-card">
      <input type="checkbox" id="terms-check-1" class="terms-check">
      <label for="terms-check-1">
        You can read our <a href="#">terms of use</a> (effective from 01 January 2026)
      </label>
    </div>

    <div class="terms-card">
      <input type="checkbox" id="terms-check-2" class="terms-check">
      <label for="terms-check-2">
        You can read our <a href="#">privacy policy</a> (effective from 01 January 2026)
      </label>
    </div>

    <button class="terms-accept" disabled>Accept</button>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
